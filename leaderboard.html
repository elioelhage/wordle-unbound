<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#121213" />
  <script>
    (function () {
      try {
        var key = "wordle-mobile-theme";
        var saved = localStorage.getItem(key);
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = saved || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", theme === "dark" ? "#121213" : "#ffffff");
      } catch (_) {}
    })();
  </script>
  <title>Wordle Unbound • Leaderboard</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef2f8;
      --text: #101726;
      --muted: #64748b;
      --border: #dbe3f0;
      --accent: #6aaa64;
      --shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
    }

    :root[data-theme="dark"] {
      --bg: #121213;
      --surface: #1a1a1b;
      --surface-2: #232325;
      --text: #f5f5f5;
      --muted: #a0a4af;
      --border: #34363a;
      --accent: #6aaa64;
      --shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(48rem 25rem at -10% -20%, color-mix(in srgb, var(--accent) 26%, transparent), transparent 62%),
        radial-gradient(48rem 25rem at 110% -20%, color-mix(in srgb, #60a5fa 18%, transparent), transparent 62%),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.4;
      padding: 0.95rem;
    }

    .page {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      margin-bottom: 0.9rem;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 0.58rem;
      min-width: 0;
    }

    .title-icon {
      width: 1.45rem;
      height: 1.45rem;
      color: var(--accent);
      flex: 0 0 auto;
    }

    .eyebrow {
      margin: 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 700;
    }

    h1 {
      margin: 0.12rem 0 0;
      font-size: clamp(1.2rem, 4vw, 1.85rem);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 0.52rem 0.88rem;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      touch-action: manipulation;
    }

    .shell {
      border: 1px solid color-mix(in srgb, var(--border) 78%, transparent);
      border-radius: 24px;
      background: color-mix(in srgb, var(--surface) 93%, transparent);
      box-shadow: var(--shadow);
      padding: 1rem;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 0.85rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.62rem;
      max-height: min(74vh, 750px);
      overflow-y: auto;
      padding-right: 0.15rem;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.7rem;
      border: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
      border-radius: 15px;
      background: linear-gradient(150deg, color-mix(in srgb, var(--surface) 88%, #fff 12%), var(--surface));
      padding: 0.78rem 0.92rem;
      transition: transform 160ms ease, box-shadow 180ms ease, border-color 180ms ease;
      animation: rise 220ms ease both;
    }

    .item:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.14);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    }

    .item.rank-1 {
      background:
        radial-gradient(120% 100% at 0% 0%, rgba(255, 246, 190, 0.75), transparent 58%),
        linear-gradient(140deg, #ffe37b 0%, #ffc93d 52%, #efb221 100%);
      border: 1px solid #eebd3b;
      color: #1f1a07;
      box-shadow: 0 14px 28px rgba(255, 195, 45, 0.34);
      transform: scale(1.015);
    }

    .item.rank-2 {
      background:
        radial-gradient(120% 100% at 0% 0%, rgba(255, 255, 255, 0.55), transparent 58%),
        linear-gradient(140deg, #f2f3f5 0%, #d7d8dc 52%, #babcc2 100%);
      border: 1px solid #acafb6;
      color: #1f2024;
      box-shadow: 0 12px 24px rgba(163, 166, 174, 0.28);
    }

    .item.rank-3 {
      background:
        radial-gradient(120% 100% at 0% 0%, rgba(255, 241, 227, 0.6), transparent 58%),
        linear-gradient(140deg, #ebb886 0%, #c78448 52%, #aa642d 100%);
      border: 1px solid #9f5d2a;
      color: #24160c;
      box-shadow: 0 12px 24px rgba(170, 99, 44, 0.3);
    }

    .left {
      display: inline-flex;
      align-items: center;
      gap: 0.46rem;
      min-width: 0;
      flex: 1;
    }

    .rank {
      min-width: 2.2rem;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      font-weight: 900;
      color: color-mix(in srgb, var(--muted) 88%, transparent);
      flex: 0 0 auto;
    }

    .item.rank-1 .rank,
    .item.rank-2 .rank,
    .item.rank-3 .rank {
      color: rgba(20, 20, 20, 0.65);
    }

    .medal {
      width: 1.05rem;
      height: 1.05rem;
      flex: 0 0 auto;
    }

    .name {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 760;
    }

    .you {
      margin-left: 0.35rem;
      opacity: 0.66;
      font-size: 0.82em;
      font-weight: 560;
    }

    .badges {
      display: inline-flex;
      align-items: center;
      gap: 0.32rem;
      margin-left: 0.5rem;
      flex: 0 0 auto;
    }

    .badge {
      width: 1.05rem;
      height: 1.05rem;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      border: 1px solid transparent;
      cursor: default;
    }

    .badge svg {
      width: 0.76rem;
      height: 0.76rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .badge.hint {
      color: #6b4f07;
      background: #f6dc72;
      border-color: #e7c94e;
    }

    .badge.played {
      color: #0b4a2e;
      background: #9be7c0;
      border-color: #6fd39f;
    }

    :root[data-theme="dark"] .badge.hint {
      color: #fbe08c;
      background: #6f5d24;
      border-color: #917935;
    }

    :root[data-theme="dark"] .badge.played {
      color: #a2f3cb;
      background: #1f5a3e;
      border-color: #2f7a56;
    }

    .score {
      font-variant-numeric: tabular-nums;
      font-weight: 860;
      font-size: 1.02rem;
      margin-left: 0.6rem;
    }

    .item.rank-1 .score,
    .item.rank-2 .score,
    .item.rank-3 .score {
      color: inherit;
    }

    .state {
      text-align: center;
      color: var(--muted);
      font-weight: 700;
      padding: 1.9rem 1rem;
      border: 1px dashed color-mix(in srgb, var(--border) 80%, transparent);
      border-radius: 14px;
      background: color-mix(in srgb, var(--surface-2) 70%, transparent);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 620px) {
      .btn { padding: 0.48rem 0.72rem; }
      .score { font-size: 0.95rem; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page">
    <header class="top">
      <div>
        <p class="eyebrow">Wordle Unbound</p>
        <div class="title-wrap">
          <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
            <path d="M4 22h16"></path>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>
          </svg>
          <h1>Leaderboard</h1>
        </div>
      </div>

      <div class="top-actions">
        <a class="btn" href="index.html">Back</a>
      </div>
    </header>

    <section class="shell" aria-label="Leaderboard list">
      <div class="meta">
        <span>Top 50 • Lowest average guesses</span>
        <span id="meta-count"></span>
      </div>
      <ul id="lb-list" class="list" aria-live="polite"></ul>
    </section>
  </div>

  <script>
    (() => {
      const supabaseUrl = "https://hcehsxnudbwjydvenlfz.supabase.co";
      const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWhzeG51ZGJ3anlkdmVubGZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzY4NzAsImV4cCI6MjA5MDY1Mjg3MH0.dPawhX90yZrme7nftMTq6A1j-KGqfHZJ8QnbBeFurl8";
      const GUESS_SCALE = 10;
      const launchDate = Date.UTC(2026, 3, 1);

      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
      const listEl = document.getElementById("lb-list");
      const metaCountEl = document.getElementById("meta-count");

      const currentUser = (() => {
        try {
          const raw = localStorage.getItem("wordle-user-data-v2");
          return raw ? JSON.parse(raw)?.username || null : null;
        } catch {
          return null;
        }
      })();

      function getCurrentSolutionIndex() {
        const now = new Date();
        const localDateAsUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
        return Math.max(0, Math.floor((localDateAsUTC - launchDate) / 86400000));
      }

      const todayIndex = getCurrentSolutionIndex();

      const medalSvg = {
        0: `<svg class="medal" viewBox="0 0 24 24" fill="none" stroke="#8a6700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>`,
        1: `<svg class="medal" viewBox="0 0 24 24" fill="none" stroke="#656a72" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>`,
        2: `<svg class="medal" viewBox="0 0 24 24" fill="none" stroke="#6f4121" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>`
      };

      const hintIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A6 6 0 1 0 7.5 11.5c.76.76 1.23 1.52 1.41 2.5"></path></svg>`;
      const playedIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"></path></svg>`;

      function renderState(text) {
        listEl.innerHTML = `<li class="state">${text}</li>`;
        metaCountEl.textContent = "";
      }

      function renderRows(rows) {
        if (!rows.length) {
          renderState("No leaderboard data yet.");
          return;
        }

        listEl.innerHTML = "";
        metaCountEl.textContent = `${rows.length} players`;

        rows.forEach((player, i) => {
          const li = document.createElement("li");
          li.className = "item";
          if (i === 0) li.classList.add("rank-1");
          else if (i === 1) li.classList.add("rank-2");
          else if (i === 2) li.classList.add("rank-3");

          const usedHintToday = Number(player.last_hint_day_index) === todayIndex;
          const playedToday = Number(player.last_played_day_index) === todayIndex
            || (player.saved_state && Number(player.saved_state.solutionIndex) === todayIndex && Boolean(player.saved_state.gameOver));

          const badges = `
            <span class="badges">
              ${playedToday ? `<span class="badge played" title="Solved today's word">${playedIcon}</span>` : ""}
              ${usedHintToday ? `<span class="badge hint" title="Used hints today">${hintIcon}</span>` : ""}
            </span>
          `;

          li.innerHTML = `
            <div class="left">
              <span class="rank">#${i + 1}</span>
              ${medalSvg[i] || ""}
              <span class="name">
                ${player.username}
                ${currentUser && player.username === currentUser ? `<span class="you">(Me)</span>` : ""}
              </span>
              ${badges}
            </div>
            <div class="score">${player.avg}</div>
          `;

          listEl.appendChild(li);
        });
      }

      async function loadLeaderboard() {
        renderState("Loading leaderboard...");

        try {
          let data = null;
          let error = null;

          ({ data, error } = await supabase
            .from("leaderboards")
            .select("username, games_played, total_guesses, last_hint_day_index, last_played_day_index, saved_state")
            .order("games_played", { ascending: false }));

          if (error) {
            ({ data, error } = await supabase
              .from("leaderboards")
              .select("username, games_played, total_guesses, last_hint_day_index, saved_state")
              .order("games_played", { ascending: false }));
          }

          if (error) {
            ({ data, error } = await supabase
              .from("leaderboards")
              .select("username, games_played, total_guesses, saved_state")
              .order("games_played", { ascending: false }));
          }

          if (error) throw error;

          const rows = (data || [])
            .filter((p) => p.username && Number(p.games_played) > 0)
            .map((p) => ({
              ...p,
              avg: ((Number(p.total_guesses || 0) / GUESS_SCALE) / Number(p.games_played || 1)).toFixed(2)
            }))
            .sort((a, b) => Number(a.avg) - Number(b.avg))
            .slice(0, 50);

          renderRows(rows);
        } catch (err) {
          console.error("Leaderboard load failed:", err);
          renderState("Failed to load leaderboard.");
        }
      }

      loadLeaderboard();
    })();
  </script>
</body>
</html>
